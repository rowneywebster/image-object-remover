<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Image Tools — Nova Technologies{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Free AI-powered image tools. Remove objects, backgrounds, edit images and more. No sign-up, files deleted in 20 minutes.{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <meta name="google-site-verification" content="5KwqQt59mbLwa-jKjN5lbRJheTrlrrbWJmvJ5qIEtJ8" />
  <meta name="google-adsense-account" content="ca-pub-3434791276648961">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3434791276648961" crossorigin="anonymous"></script>
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-nova">Nova</span><span class="logo-tech">Tools</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link {% if active == 'home' %}nav-active{% endif %}">Tools</a>
        <a href="/blog" class="nav-link {% if active == 'blog' %}nav-active{% endif %}">Blog</a>
        <a href="/about" class="nav-link {% if active == 'about' %}nav-active{% endif %}">About</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 <strong>Nova Technologies</strong> — Web · AI · Hosting · Marketing · Apps</p>
      <div class="footer-links">
        <a href="/remove-object">Object Remover</a>
        <a href="/remove-background">Background Remover</a>
        <a href="/image-editor">Image Editor</a>
        <a href="/color-picker">Color Picker</a>
        <a href="/blog">Blog</a>
        <a href="/about">About</a>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </footer>

</body>
</html>
